<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict'IF - Carte des Clients</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1A1B2F;
            --gold: #D4AF37;
            --purple-glow: #6a0dad;
            --white: #F5F5F5;
            --map-fill: rgba(75, 0, 130, 0.15);
        }

        body {
            margin: 0;
            padding: 40px 20px;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--white);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }

        /* --- Conteneur de la Carte --- */
        .map-container {
            position: relative;
            width: 100%;
            max-width: 700px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }

        /* Style de la France en SVG */
        .france-svg {
            width: 100%;
            height: auto;
            fill: var(--map-fill);
            stroke: var(--gold);
            stroke-width: 0.5;
            filter: drop-shadow(0 0 8px rgba(106, 13, 173, 0.4));
            transition: all 0.5s ease;
        }

        /* --- Les Points (Clients) --- */
        .client-point {
            position: absolute;
            width: 10px;
            height: 10px;
            background-color: var(--gold);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 15px var(--gold), 0 0 5px #fff;
            cursor: pointer;
            animation: twinkle 2s infinite ease-in-out;
        }

        .client-point::after {
            content: attr(data-city);
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translate 50%;
            background: rgba(0, 0, 0, 0.8);
            color: var(--gold);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            border: 1px solid var(--gold);
        }

        .client-point:hover::after {
            opacity: 1;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.7; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
        }

        /* --- Positionnement manuel des points (en % par rapport au container) --- */
        .p-lille { top: 12%; left: 56%; }
        .p-paris { top: 28%; left: 49%; }
        .p-strasbourg { top: 30%; left: 82%; }
        .p-nantes { top: 44%; left: 24%; }
        .p-lyon { top: 58%; left: 68%; }
        .p-bordeaux { top: 68%; left: 30%; }
        .p-marseille { top: 84%; left: 70%; }
        .p-toulouse { top: 82%; left: 42%; }

        /* --- Contrôles de Zoom --- */
        .zoom-ui {
            position: absolute;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--gold);
            border-radius: 8px;
            background: rgba(26, 27, 47, 0.8);
        }

        .zoom-ui button {
            background: transparent;
            border: none;
            color: var(--gold);
            width: 40px;
            height: 40px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        .zoom-ui button:hover {
            background: var(--gold);
            color: var(--bg-color);
        }

        .zoom-ui button:first-child {
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }
    </style>
</head>
<body>

    <h1>Répartition Géographique</h1>

    <div class="map-container">
        <img class="france-svg" src="https://png.pngtree.com/png-vector/20220125/ourmid/pngtree-france-map-with-regions-new-symbol-people-vector-png-image_26226752.png" alt="Description de l'image">

        <div class="client-point p-lille" data-city="Lille : 12 clients"></div>
        <div class="client-point p-paris" data-city="Paris : 145 clients"></div>
        <div class="client-point p-strasbourg" data-city="Strasbourg : 24 clients"></div>
        <div class="client-point p-nantes" data-city="Nantes : 31 clients"></div>
        <div class="client-point p-lyon" data-city="Lyon : 89 clients"></div>
        <div class="client-point p-bordeaux" data-city="Bordeaux : 45 clients"></div>
        <div class="client-point p-toulouse" data-city="Toulouse : 38 clients"></div>
        <div class="client-point p-marseille" data-city="Marseille : 62 clients"></div>

        <div class="zoom-ui">
            <button>+</button>
            <button>−</button>
        </div>
    </div>

</body>
</html>
