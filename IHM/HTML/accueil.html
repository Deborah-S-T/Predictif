<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict'IF - Accueil</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1A1B2F;
            --gold: #D4AF37;
            --purple: #4B0082;
            --white: #F5F5F5;
            --gray: #A0A0A0;
            --aura: rgba(75, 0, 130, 0.3);
        }

        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, var(--aura) 0%, var(--bg-color) 70%);
            color: var(--white);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Header --- */
        header {
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            color: var(--gold);
            letter-spacing: 2px;
            text-decoration: none;
        }

        nav a {
            color: var(--white);
            text-decoration: none;
            margin-left: 20px;
            font-size: 0.9rem;
            transition: color 0.3s;
        }

        nav a:hover {
            color: var(--gold);
        }

        /* --- Hero Section --- */
        .hero {
            text-align: center;
            padding: 60px 20px;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            margin: 0;
            color: var(--gold);
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .subtitle {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 1.2rem;
            color: var(--gray);
            margin-top: -10px;
        }

        /* --- Medium Preview --- */
        .medium-preview {
            max-width: 900px;
            margin: 40px auto;
            text-align: center;
        }

        .section-title {
            border-bottom: 1px solid var(--gold);
            display: inline-block;
            padding-bottom: 5px;
            margin-bottom: 30px;
        }

        .cards-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }

        .card-mini {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(212, 175, 55, 0.1);
            padding: 15px;
            width: 150px;
            border-radius: 8px;
            transition: transform 0.3s;
        }

        .card-mini:hover {
            transform: translateY(-5px);
            border-color: var(--gold);
        }

        .btn-link {
            color: var(--gold);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 600;
        }

        /* --- Auth Blocks --- */
        .auth-sections {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 50px auto;
            flex-wrap: wrap;
        }

        .auth-card {
            background: rgba(75, 0, 130, 0.1);
            border: 1px solid var(--gold);
            padding: 30px;
            border-radius: 12px;
            width: 300px;
            text-align: center;
        }

        .auth-card.secondary {
            border-color: var(--gray);
            background: transparent;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
            cursor: pointer;
        }

        .btn-primary {
            background-color: var(--gold);
            color: var(--bg-color);
        }

        .btn-primary:hover {
            background-color: #e5c158;
            box-shadow: 0 0 15px var(--gold);
        }

        .btn-outline {
            border: 1px solid var(--gold);
            color: var(--gold);
        }

        .btn-outline:hover {
            background: var(--gold);
            color: var(--bg-color);
        }

        /* --- Footer --- */
        footer {
            margin-top: auto;
            padding: 40px 5%;
            background: rgba(0, 0, 0, 0.2);
            border-top: 1px solid rgba(212, 175, 55, 0.2);
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--gray);
        }

        .footer-info h4 {
            color: var(--gold);
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <main>
        <section class="hero">
            <h1>PREDICT'IF</h1>
            <p class="subtitle">LE site de médiums à consulter</p>
        </section>

        <section class="medium-preview">
            <h3 class="section-title">Notre liste de médiums</h3>
            <div class="cards-container">
                <div class="card-mini">Gwenäelle</div>
                <div class="card-mini">Mme Irma</div>
                <div class="card-mini">Prof. Tram</div>
            </div>
            <a href="#" class="btn-link">Voir tous nos experts →</a>
        </section>

        <section class="auth-sections">
            <div class="auth-card">
                <p>Vous voulez profiter d'une prédiction ?</p>
                <a href="#" class="btn btn-primary">Inscrivez-vous</a>
            </div>

            <div class="auth-card secondary">
                <p>Vous êtes déjà inscrit ? Parfait.</p>
                <a href="#" class="btn btn-outline">Connectez-vous</a>
            </div>
        </section>
    </main>

</body>
</html>
