<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict'IF - Connexion</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1A1B2F;
            --gold: #D4AF37;
            --purple: #4B0082;
            --white: #F5F5F5;
            --gray: #A0A0A0;
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, rgba(75, 0, 130, 0.2) 0%, var(--bg-color) 80%);
            color: var(--white);
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            text-align: center;
            font-size: 2rem;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: var(--gray);
            font-weight: 300;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            background: var(--input-bg);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 5px;
            color: white;
            font-family: 'Montserrat', sans-serif;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.2);
        }

        .helper-text {
            display: block;
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--gray);
        }

        .helper-text a {
            color: var(--gold);
            text-decoration: none;
            border-bottom: 1px solid transparent;
            transition: border 0.3s;
        }

        .helper-text a:hover {
            border-bottom: 1px solid var(--gold);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit:hover {
            background: var(--gold);
            color: var(--bg-color);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.4);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h1>Connexion</h1>
        
        <form action="#" method="POST">
            <div class="form-group">
                <label for="email">Mail :</label>
                <input type="email" id="email" name="email" placeholder="victor.hugo@insa-lyon.fr" required>
            </div>

            <div class="form-group">
                <label for="password">Mot de passe :</label>
                <input type="password" id="password" name="password" placeholder="password123" required>
            </div>

            <p class="helper-text">
                Pas de compte ? <a href="#">S'inscrire</a>
            </p>

            <button type="submit" class="btn-submit">Se connecter</button>
        </form>
    </div>

</body>
</html>
