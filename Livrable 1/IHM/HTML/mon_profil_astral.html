<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict'IF - Mon Profil Astral</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1A1B2F;
            --gold: #D4AF37;
            --purple: #4B0082;
            --white: #F5F5F5;
            --gray: #A0A0A0;
            --card-bg: rgba(255, 255, 255, 0.03);
        }

        body {
            margin: 0;
            padding: 40px 20px;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at center, rgba(75, 0, 130, 0.15) 0%, var(--bg-color) 80%);
            color: var(--white);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }

        .astral-card {
            width: 100%;
            max-width: 550px;
            background: var(--card-bg);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            position: relative;
            overflow: hidden;
        }

        /* Ornements dans les coins */
        .astral-card::before {
            content: '✨';
            position: absolute;
            top: 15px;
            left: 15px;
            color: var(--gold);
            opacity: 0.5;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2);
            padding-bottom: 15px;
            letter-spacing: 1px;
        }

        .profile-grid {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .astral-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed rgba(255, 255, 255, 0.1);
        }

        .label {
            font-size: 1rem;
            color: var(--gray);
            font-weight: 300;
            flex: 1;
        }

        /* Les boîtes de résultats (le "[im] signe" de ton schéma) */
        .result-box {
            background: rgba(75, 0, 130, 0.2);
            border: 1px solid var(--gold);
            padding: 10px 20px;
            border-radius: 8px;
            min-width: 150px;
            text-align: center;
            color: var(--white);
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: inset 0 0 10px rgba(212, 175, 55, 0.1);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .result-box:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
        }

        .icon {
            font-size: 1.2rem;
        }

        /* Couleur porte-bonheur spécifique */
        .color-dot {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            display: inline-block;
            border: 1px solid white;
        }

    </style>
</head>
<body>

    <div class="astral-card">
        <h1>Mon Profil Astral</h1>
        
        <div class="profile-grid">
            
            <div class="astral-item">
                <span class="label">Signe du zodiaque :</span>
                <div class="result-box">
                    <span class="icon">♎</span>
                    <span>Balance</span>
                </div>
            </div>

            <div class="astral-item">
                <span class="label">Signe astrologique chinois :</span>
                <div class="result-box">
                    <span class="icon">🐉</span>
                    <span>Dragon</span>
                </div>
            </div>

            <div class="astral-item">
                <span class="label">Couleur porte-bonheur :</span>
                <div class="result-box">
                    <span class="color-dot" style="background-color: #50C878;"></span>
                    <span>Émeraude</span>
                </div>
            </div>

            <div class="astral-item">
                <span class="label">Animal totem :</span>
                <div class="result-box">
                    <span class="icon">🦉</span>
                    <span>Chouette</span>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
