<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predict'IF - Inscription</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #1A1B2F;
            --gold: #D4AF37;
            --purple: #4B0082;
            --white: #F5F5F5;
            --gray: #A0A0A0;
            --input-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            padding: 40px 20px;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(75, 0, 130, 0.2) 0%, var(--bg-color) 60%);
            color: var(--white);
            display: flex;
            justify-content: center;
        }

        .signup-container {
            width: 100%;
            max-width: 500px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 15px;
            padding: 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            text-align: center;
            font-size: 2.2rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            text-align: center;
            color: var(--gray);
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        form {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Deux colonnes pour Nom/Prénom */
            gap: 15px;
        }

        .full-width {
            grid-column: span 2;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85rem;
            color: var(--gold);
            margin-bottom: 5px;
            font-weight: 600;
        }

        input {
            padding: 12px;
            background: var(--input-bg);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 5px;
            color: white;
            font-family: 'Montserrat', sans-serif;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--gold);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.1);
        }

        input::placeholder {
            color: rgba(255,255,255,0.2);
            font-size: 0.8rem;
        }

        .btn-container {
            grid-column: span 2;
            margin-top: 20px;
            text-align: center;
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: var(--gold);
            color: var(--bg-color);
            border: none;
            border-radius: 5px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit:hover {
            background: #e5c158;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            transform: translateY(-2px);
        }

        .login-link {
            display: block;
            margin-top: 20px;
            font-size: 0.85rem;
            color: var(--gray);
            text-decoration: none;
            transition: color 0.3s;
        }

        .login-link:hover {
            color: var(--gold);
        }
    </style>
</head>
<body>

    <div class="signup-container">
        <h1>Inscription</h1>
        <p class="subtitle">Rejoignez Predict'IF et découvrez votre avenir</p>
        
        <form action="#" method="POST">
            <div class="form-group">
                <label for="nom">Nom :</label>
                <input type="text" id="nom" name="nom" placeholder="Hugo" required>
            </div>
            <div class="form-group">
                <label for="prenom">Prénom :</label>
                <input type="text" id="prenom" name="prenom" placeholder="Victor" required>
            </div>

            <div class="form-group full-width">
                <label for="mail">Mail :</label>
                <input type="email" id="mail" name="mail" placeholder="victor.hugo@insa-lyon.fr" required>
            </div>

            <div class="form-group full-width">
                <label for="dob">Date de naissance :</label>
                <input type="date" id="dob" name="dob" required>
            </div>

            <div class="form-group full-width">
                <label for="adresse">Adresse postale :</label>
                <input type="text" id="adresse" name="adresse" placeholder="13 rue Albert Einstein 69100 Villeurbanne" required>
            </div>

            <div class="form-group full-width">
                <label for="tel">Numéro de tel :</label>
                <input type="tel" id="tel" name="tel" placeholder="+33 678 91 23 45" required>
            </div>

            <div class="form-group">
                <label for="mdp">Mot de passe :</label>
                <input type="password" id="mdp" name="mdp" required>
            </div>
            <div class="form-group">
                <label for="conf-mdp">Confirmation mdp :</label>
                <input type="password" id="conf-mdp" name="conf-mdp" required>
            </div>

            <div class="btn-container">
                <button type="submit" class="btn-submit">Créer mon compte</button>
                <a href="#" class="login-link">Déjà inscrit ? Connectez-vous</a>
            </div>
        </form>
    </div>

</body>
</html>
